name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: 45rabbitto
  DOCKER_HUB_REPO: diamonds-price-prediction

jobs:
  mlflow-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: 3.12.6
        environment-file: MLProject/conda.yaml
        activate-environment: mlflow-env
        auto-activate-base: false
    
    - name: Run MLflow project
      shell: bash -l {0}
      run: |
        cd MLProject
        mlflow run . -P test_size=0.2 -P random_state=42
    
    - name: Read run_id from file
      id: mlflow_run
      shell: bash -l {0}
      run: |
        RUN_ID=$(cat MLProject/run_id.txt)
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        echo "RUN_ID=$RUN_ID"
    
    - name: Copy model to docker context
      run: |
        cp -r MLProject/mlruns/0/${{ steps.mlflow_run.outputs.run_id }}/artifacts/model MLProject/docker_model
        cp MLProject/Dockerfile MLProject/docker_model/
        cp MLProject/conda.yaml MLProject/docker_model/ || true
    
    - name: Build Docker Image with MLflow
      shell: bash -l {0}
      run: |
        cd MLProject
        export MLFLOW_HOME=$(python -c "import mlflow; print(mlflow.__path__[0])")
        mlflow models build-docker \
          -m "runs:/${{ steps.mlflow_run.outputs.run_id }}/model" \
          -n "${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest" \
          --install-mlflow \
          --enable-mlserver
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest
        docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
