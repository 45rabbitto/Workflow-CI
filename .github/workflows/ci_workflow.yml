name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci_workflow.yml'
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: 45rabbitto
  DOCKER_HUB_REPO: diamonds-price-prediction

jobs:
  mlflow-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: "latest"
        python-version: 3.12.6
        environment-file: MLProject/conda.yaml
        activate-environment: mlflow-env
        auto-activate-base: false
        auto-update-conda: false
        channels: conda-forge,defaults
    
    - name: Check Conda Environment
      shell: bash -l {0}
      run: |
        conda info
        conda list
        python --version
        pip --version
    
    - name: Run MLflow project
      shell: bash -l {0}
      run: |
        cd MLProject
        mlflow run . --env-manager=conda -P test_size=0.2 -P random_state=42 -P n_estimators=100 -P max_depth=10
    
    - name: Get latest MLflow run_id
      id: mlflow_run
      shell: bash -l {0}
      run: |
        RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 | grep -oP 'run_id: \K[^\s]+' | head -1)
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        echo "RUN_ID=$RUN_ID"
    
    - name: Build Docker Model with MLflow
      shell: bash -l {0}
      run: |
        cd MLProject
        mlflow models build-docker -m "runs:/${{ steps.mlflow_run.outputs.run_id }}/model" -n "${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest"
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Tag Docker Image
      run: |
        docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
    
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
