name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci_workflow.yml'
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: 45rabbitto
  DOCKER_HUB_REPO: diamonds-price-prediction

jobs:
  mlflow-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.12.6
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.6'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0
        pip install cloudpickle==3.1.2
        pip install numpy==1.26.2
        pip install psutil==7.2.2
        pip install scikit-learn==1.5.1
        pip install scipy==1.16.3
        pip install matplotlib==3.8.2
        pip install pandas==2.1.4
    
    - name: Run MLflow project
      run: |
        cd MLProject
        mlflow run . --env-manager=local -P test_size=0.2 -P random_state=42 -P n_estimators=100 -P max_depth=10
    
    - name: Get latest MLflow run_id
      id: mlflow_run
      run: |
          RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 | grep -oP 'run_id: \K[^\s]+' | head -1)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "RUN_ID=$RUN_ID"
    
    - name: Build Docker Model with MLflow
      run: |
        cd MLProject
        mlflow models build-docker -m "runs:/${{ steps.mlflow_run.outputs.run_id }}/model" -n "${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest" --enable-mlserver
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Tag Docker Image
      run: |
        docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
    
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
