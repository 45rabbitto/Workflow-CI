name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci_workflow.yml'
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: 45rabbitto
  DOCKER_HUB_REPO: diamonds-price-prediction

jobs:
  mlflow-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: false
        python-version: 3.12.6
        environment-file: MLProject/conda.yaml
        activate-environment: mlflow-env
        auto-activate-base: false
    
    - name: Check Env
      shell: bash -l {0}
      run: |
        conda info
        python --version
        pip --version
    
    - name: Verify dependencies
      shell: bash -l {0}
      run: |
        python -c "import mlflow; print(f'MLflow version: {mlflow.__version__}')"
        python -c "import sklearn; print(f'Sklearn version: {sklearn.__version__}')"
        python -c "import pandas; print(f'Pandas version: {pandas.__version__}')"
    
    - name: Run MLflow project
      shell: bash -l {0}
      run: |
        cd MLProject
        mlflow run . --env-manager=conda -P test_size=0.2 -P random_state=42 -P n_estimators=100 -P max_depth=10
    
    - name: Get latest MLflow run_id
      id: mlflow_run
      shell: bash -l {0}
      run: |
        RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 --output json | python -c "import sys, json; print(json.load(sys.stdin)[0]['info']['run_id'])")
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        echo "Latest run_id: $RUN_ID"
    
    - name: Build Docker Model with MLflow
      shell: bash -l {0}
      run: |
        cd MLProject
        mlflow models build-docker -m "runs:/${{ steps.mlflow_run.outputs.run_id }}/model" -n "${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest"
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Tag Docker Image
      run: |
        docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
    
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
