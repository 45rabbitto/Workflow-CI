name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci_workflow.yml'
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: 45rabbitto
  DOCKER_HUB_REPO: diamonds-price-prediction

jobs:
  mlflow-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'
    
    - name: Check Env
      run: |
        python --version
        pip --version
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib
    
    - name: Run MLflow project
      run: |
        cd MLProject
        mlflow run . -P test_size=0.2 -P random_state=42 -P n_estimators=100 -P max_depth=10
    
    - name: Get latest MLflow run_id
      id: mlflow_run
      run: |
        RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 --output json | python -c "import sys, json; print(json.load(sys.stdin)[0]['info']['run_id'])")
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        echo "Latest run_id: $RUN_ID"
    
    - name: Create credentials.json from secret
      env:
        GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
      run: |
        echo "$GDRIVE_CREDENTIALS_DATA" > credentials.json
        echo "credentials.json created"
    
    - name: Upload to Google Drive using gdrive CLI
      run: |
        # Download gdrive CLI
        wget https://github.com/glotlabs/gdrive/releases/download/3.9.0/gdrive_linux_x64.tar.gz
        tar -xzf gdrive_linux_x64.tar.gz
        chmod +x gdrive
        
        # Upload menggunakan service account
        ./gdrive upload --recursive --parent ${{ secrets.GDRIVE_FOLDER_ID }} --service-account credentials.json MLProject/data_preprocessed/
    
    - name: Build Docker Model with MLflow
      run: |
        cd MLProject
        mlflow models build-docker -m "runs:/${{ steps.mlflow_run.outputs.run_id }}/model" -n "${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest"
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Tag Docker Image
      run: |
        docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
    
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
    
    - name: Clean up
      run: |
        rm -f credentials.json
        rm -f gdrive*
